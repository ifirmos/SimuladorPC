name: CI – SimuladorPC

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

  # Permite que o GitHub Copilot Coding Agent acione este workflow
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # Job 1: Frontend Angular (SimuladorPCSpa)
  # ─────────────────────────────────────────
  frontend:
    name: Frontend – Angular Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: SimuladorPCSpa

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: SimuladorPCSpa/package-lock.json

      - name: Instalar dependências (npm install)
        run: npm install

      - name: Build do frontend (npm run build)
        run: npm run build

  # ─────────────────────────────────────────
  # Job 2: Backend .NET (SimuladorPC.sln)
  # ─────────────────────────────────────────
  backend:
    name: Backend – .NET Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restaurar dependências NuGet
        run: dotnet restore SimuladorPC.sln

      - name: Build do backend (dotnet build)
        run: dotnet build SimuladorPC.sln --no-restore --configuration Release
